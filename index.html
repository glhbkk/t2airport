<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d4a;
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --accent-glow: rgba(59,130,246,0.25);
    --highlight: #f59e0b;
    --highlight2: #fbbf24;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
    --green: #10b981;
    --red: #ef4444;
    --s-grade: #f59e0b;
    --a-grade: #3b82f6;
    --b-grade: #8b5cf6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .key-search-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 0.6rem 1.2rem;
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .key-search-btn:hover {
    border-color: var(--highlight);
    color: var(--highlight);
  }

  /* Modal */
  .key-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    backdrop-filter: blur(4px);
  }

  .key-modal-overlay.open { display: block; }

  .key-modal {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: min(95vw, 560px);
    height: 85vh;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    z-index: 101;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .key-modal.open { display: flex; }

  .key-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;

let selectedDate = new Date();

// 현재 시간에 따라 주간/야간 자동 설정
// 오전 6시(6:00) ~ 오후 5시(17:00) → 주간, 그 외 → 야간
function getDefaultShift() {
  const h = new Date().getHours();
  return (h >= 6 && h < 17) ? 'day' : 'night';
}
let shiftMode = getDefaultShift();
let calendarMonth = new Date(); // 달력에 표시 중인 연/월

function getWeekOfMonth(date) {
  const d = date.getDate();
  const dow = date.getDay();

  const thisSunday = new Date(date); thisSunday.setDate(d - dow);
  const thisSaturday = new Date(thisSunday); thisSaturday.setDate(thisSunday.getDate() + 6);

  // 이번 주에 다음달 1일이 포함되는지 확인
  const nextMonth1st = new Date(thisSunday.getFullYear(), thisSunday.getMonth() + 1, 1);
  const nm1stDow = nextMonth1st.getDay();
  if (nextMonth1st >= thisSunday && nextMonth1st <= thisSaturday) {
    if (nm1stDow >= 1 && nm1stDow <= 4) return 1;  // 다음달 1주차
    if (nm1stDow >= 5) return 0; // 점검없음
  }

  const year = thisSunday.getFullYear();
  const month = thisSunday.getMonth();
  const sunDay = thisSunday.getDate();
  const firstDayOfMonth = new Date(year, month, 1).getDay();

  if (firstDayOfMonth === 0) {
    // 1일이 일요일 → 1일부터 1주차
    return Math.min(Math.floor((sunDay - 1) / 7) + 1, 4);
  } else if (firstDayOfMonth >= 1 && firstDayOfMonth <= 4) {
    // 1일이 월~목 → 1일 포함 주가 1주차, 첫 일요일부터 2주차
    const firstSunday = 8 - firstDayOfMonth;
    if (sunDay < firstSunday) return 1;
    return Math.min(Math.floor((sunDay - firstSunday) / 7) + 2, 4);
  } else {
    // 1일이 금·토 → 첫 일요일 이전 0주차
    const firstSunday = 8 - firstDayOfMonth;
    if (sunDay < firstSunday) return 0;
    return Math.min(Math.floor((sunDay - firstSunday) / 7) + 1, 4);
  }
}

function hasInspection(date) {
  return getItemsForDay(date).length > 0;
}

function formatDate(date) {
  return `${String(date.getMonth()+1).padStart(2,'0')}.${String(date.getDate()).padStart(2,'0')}`;
}

function toggleCalendar() {
  const wrap = document.getElementById('calendarWrap');
  const btn = document.getElementById('calToggleBtn');
  const isOpen = wrap.classList.toggle('open');
  btn.classList.toggle('open', isOpen);
  btn.querySelector('span:first-child').textContent = isOpen ? '📅 달력 숨기기' : '📅 달력 보기';
}

function moveMonth(delta) {
  calendarMonth = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth() + delta, 1);
  renderCalendar();
}

function renderCalendar() {
  const year = calendarMonth.getFullYear();
  const month = calendarMonth.getMonth();
  const today = new Date();

  document.getElementById('calMonthLabel').textContent =
    `${year}년 ${month + 1}월`;

  const firstDay = new Date(year, month, 1).getDay(); // 0=일
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const DOW = ['일','월','화','수','목','금','토'];
  let html = DOW.map(d => `<div class="cal-dow">${d}</div>`).join('');

  // 빈 칸
  for (let i = 0; i < firstDay; i++) {
    html += `<div class="cal-day empty"></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dt = new Date(year, month, d);
    const dow = dt.getDay();
    const isToday = dt.toDateString() === today.toDateString();
    const isSelected = dt.toDateString() === selectedDate.toDateString();
    const hasDot = hasInspection(dt);
    const cls = [
      'cal-day',
      dow === 0 ? 'sunday' : '',
      dow === 6 ? 'saturday' : '',
      isToday ? 'today' : '',
      isSelected ? 'selected' : '',
    ].filter(Boolean).join(' ');

    html += `<div class="${cls}" onclick="selectDate(new Date(${dt.getTime()}))">
      ${d}${hasDot ? '<span class="dot"></span>' : ''}
    </div>`;
  }

  document.getElementById('calGrid').innerHTML = html;
}

  selectedDate = new Date();

  renderCalendar();
  renderDateNav();
  renderAll();
}

function renderDateNav() {
  const today = new Date();
  const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);

  const dates = [
    { label: '어제', date: yesterday },
    { label: '오늘', date: today },
    { label: '내일', date: tomorrow },
  ];

  document.getElementById('dateNav').innerHTML = dates.map(({ label, date }) => {
    const isActive = date.toDateString() === selectedDate.toDateString();
    const dayName = DAYS[date.getDay()] + '요일';
    return `
      <div class="date-nav-btn ${isActive ? 'active' : ''}"
        onclick="selectDate(new Date(${date.getTime()}))">
        <div class="nav-label">${label}</div>
        <div class="nav-date">${formatDate(date)}</div>
        <div class="nav-day">${dayName}</div>
      </div>
    `;
  }).join('');
}

function selectDate(date) {
  selectedDate = date;
  crewMode = 'basic';
  shiftMode = getDefaultShift();
  // 선택한 날짜가 다른 달이면 달력도 이동
  calendarMonth = new Date(date.getFullYear(), date.getMonth(), 1);
  renderCalendar();
  renderDateNav();
  renderAll();
}

function getItemsForDay(date) {
  const day = DAYS[date.getDay()];
  const week = getWeekOfMonth(date);
  const result = [];
  for (const [groupKey, group] of Object.entries(inspectionData)) {
    if (group.cycle === `${week}주차`) {
      for (const item of group.items) {
        if (item.days.includes(day)) result.push({ ...item, cycle: group.cycle, grade: group.grade });
      }
    }
  }
  return result;
}

function renderAll() {
  const items = getItemsForDay(selectedDate);
  const week = getWeekOfMonth(selectedDate);
  const day = DAYS[selectedDate.getDay()];
  const isSunday = selectedDate.getDay() === 0;

  const hasSplit = items.some(i => i.split);
  const hasThree = items.some(i => i.split && i.split.three);

  // 총 개소 계산
  let totalCount = 0;
  if (isSunday && shiftMode === 'night') {
    totalCount = nightItems.reduce((s, i) => s + (i.count || 0), 0);
  } else {
    for (const item of items) {
      if (item.split && crewMode === 'two') {
        const arr = item.split.two || [item.split.west, item.split.east];
        totalCount += arr.reduce((s, c) => s + c.locations.length, 0);
      } else if (item.split && crewMode === 'three' && item.split.three) {
        totalCount += item.split.three.reduce((s, c) => s + c.locations.length, 0);
      } else {
        totalCount += (item.count || 0);
      }
    }
  }

  const countNavEl = document.getElementById('countNav');
  if (countNavEl) {
    countNavEl.innerHTML = `
      <div class="date-nav-btn" style="cursor:default; grid-column: 1 / -1; padding: 0.4rem 1rem; display:flex; flex-direction:row; align-items:center; justify-content:center; gap:0.6rem;">
        <div class="nav-day" style="margin:0; margin-right:0.4rem">${week === 0 ? '5주차' : week + '주차'} · ${day}요일</div>
        <div class="nav-label" style="margin:0">총</div>
        <div class="nav-date" style="font-size:1rem">${totalCount}</div>
        <div class="nav-label" style="margin:0">개소</div>
      </div>
    `;
  }

  let html = '';

  // 일요일이면 주간/야간 버튼 표시
  if (isSunday) {
    html += `
      <div class="shift-selector">
        <span class="shift-label">점검 시간 :</span>
        <button class="shift-btn ${shiftMode === 'day' ? 'active' : ''}" onclick="setShift('day')">주간</button>
        <button class="shift-btn ${shiftMode === 'night' ? 'active' : ''}" onclick="setShift('night')">야간</button>
      </div>
    `;
  }

  if (isSunday && shiftMode === 'night') {
    // 야간 점검 표시
    html += `<div class="cards-grid">`;
    for (const item of nightItems) {
      html += renderCard({ ...item, cycle: `${week}주차`, grade: 'A/B/C/무등급' });
    }
    html += `</div>`;
  } else if (items.length === 0) {
    html += `<div class="empty-state">이 날의 점검 항목이 없습니다.</div>`;
  } else {
    if (hasSplit) {
      html += `
        <div class="crew-selector">
          <span class="crew-label">점검 인원 :</span>
          <button class="crew-btn ${crewMode === 'basic' ? 'active' : ''}" onclick="setCrew('basic')">기본</button>
          <button class="crew-btn ${crewMode === 'two' ? 'active' : ''}" onclick="setCrew('two')">2명</button>
          ${hasThree ? `<button class="crew-btn ${crewMode === 'three' ? 'active' : ''}" onclick="setCrew('three')">3명</button>` : ''}
        </div>
      `;
    }
    const cycles = {};
    for (const item of items) {
      if (!cycles[item.cycle]) cycles[item.cycle] = [];
      cycles[item.cycle].push(item);
    }
    for (const [cycle, cycleItems] of Object.entries(cycles)) {
      html += `<div class="cards-grid">`;
      for (const item of cycleItems) {
        if (item.split && crewMode === 'two') {
          const arr = item.split.two || [item.split.west, item.split.east];
          for (const c of arr) html += renderCard({ ...c, cycle: item.cycle, grade: item.grade, count: c.locations.length });
        } else if (item.split && crewMode === 'three' && item.split.three) {
          for (const c of item.split.three) html += renderCard({ ...c, cycle: item.cycle, grade: item.grade, count: c.locations.length });
        } else {
          html += renderCard(item);
        }
      }
      html += `</div>`;
    }
  }

  document.getElementById('mainContent').innerHTML = html;
  document.getElementById('footerInfo').textContent =
    `마지막 업데이트: ${new Date().toLocaleString('ko-KR')} · v1.0`;
}

function setCrew(mode) {

  renderAll();

// checked 상태 저장: key = "cardTitle::loc"
const checkedLocs = new Set();

function toggleLoc(key, el) {
  if (checkedLocs.has(key)) {
    checkedLocs.delete(key);
    el.classList.remove('checked');
  } else {
    checkedLocs.add(key);
    el.classList.add('checked');
  }
  // 진행률 업데이트
  const cardEl = el.closest('.insp-card');
  updateProgress(cardEl);
}

function updateProgress(cardEl) {
  const tags = cardEl.querySelectorAll('.loc-tag');
  const total = tags.length;
  const done = cardEl.querySelectorAll('.loc-tag.checked').length;
  const pct = total ? Math.round(done / total * 100) : 0;
  const fill = cardEl.querySelector('.progress-fill');
  const text = cardEl.querySelector('.progress-text');
  if (fill) fill.style.width = pct + '%';
  if (text) text.textContent = `${done}/${total}`;
}

function gradeClass(grade) {
  if (!grade) return 'grade-none';
  if (grade === 'S') return 'grade-s';
  if (grade.startsWith('A')) return 'grade-a';
  if (grade.startsWith('B')) return 'grade-b';
  if (grade.startsWith('C')) return 'grade-c';
  return 'grade-none';
}

function renderCard(item) {
  const gc = gradeClass(item.grade);

  const total = item.locations.length;
  const doneCount = item.locations.filter(loc => checkedLocs.has(`${item.title}::${loc}`)).length;
  const pct = total ? Math.round(doneCount / total * 100) : 0;

  const locTags = item.locations.map(loc => {
    const key = `${item.title}::${loc}`;
    const isHL = item.highlighted && item.highlighted.some(h => loc.includes(h));
    const isChecked = checkedLocs.has(key);
    return `<span class="loc-tag ${isHL ? 'highlight' : ''} ${isChecked ? 'checked' : ''}"
      onclick="toggleLoc('${key.replace(/'/g,"\\'")}', this)">${loc}</span>`;
  }).join('');

  return `
    <div class="insp-card ${gc}">
      <div class="card-top">
        <div class="card-title">${item.title}</div>
      </div>
      <div class="card-progress">
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="progress-text">${doneCount}/${total}</div>
      </div>
      <div class="locations-label">점검 위치</div>
      <div class="location-tags">${locTags}</div>
    </div>
  ${item.note ? `
  <div class="card-note">
    <div class="card-note-title">🔑 열쇠목록</div>
    <table class="note-table">
      <thead>
        <tr><th>번호</th><th>장소</th><th>비고</th></tr>
      </thead>
      <tbody>
        ${item.note.map(r => `<tr><td class="${['패스','패스O'].includes(r.num) ? 'pass' : ''}">${r.num}</td><td>${r.name}</td><td>${r.remark}</td></tr>`).join('')}
      </tbody>
    </table>
  </div>` : ''}
  `;
}

function openKeySearch() {
  document.getElementById('keyModalOverlay').classList.add('open');
  document.getElementById('keyModal').classList.add('open');
  document.getElementById('keySearchInput').value = '';
  document.getElementById('keySearchInput').focus();
  searchKeys();
}

function closeKeySearch() {
  document.getElementById('keyModalOverlay').classList.remove('open');
  document.getElementById('keyModal').classList.remove('open');
}

function searchKeys() {
  const q = document.getElementById('keySearchInput').value.trim().toLowerCase();
  const results = q
    ? keyData.filter(k => k.name.toLowerCase().includes(q) || String(k.num).includes(q))
    : [...keyData];

  results.sort((a, b) => {
    const na = parseInt(a.num) || 0;
    const nb = parseInt(b.num) || 0;
    return na - nb;
  });

  const el = document.getElementById('keyResults');
  if (results.length === 0) {
    el.innerHTML = `<div class="key-empty">검색 결과가 없습니다.</div>`;
    return;
  }
  el.innerHTML = results.map(k => `
    <div class="key-item">
      <span class="key-num">${k.num}</span>
      <span class="key-name">${k.name}</span>
      <span class="key-category">${k.category}</span>
    </div>
  `).join('');
}

// 카테고리 그룹 구조

  '제2여객터미널': ['T2 (서편)','T2 (동편)','T2 (4단계 서편)','T2 (4단계 동편)','T2 (교통센터)','T2 (계류장관제소)','관제탑'],
  '부대건물': ['4단계 부대 (LANDSIDE)','4단계 부대 (AIRSIDE)','3단계 부대 (LANDSIDE)','3단계 부대 (AIRSIDE)','부대(기타 AIRSIDE)'],
  '부대건물(동측LAND)': ['부대건물_동측_LANDSIDE_1','부대건물_동측_LANDSIDE_2','부대건물_동측_LANDSIDE_3','부대건물_동측_LANDSIDE_4','부대건물_동측_LANDSIDE_5'],
  '외곽시설': ['소각시설','중수도시설','배전변전소A','제설작업장1','제설작업장2','비상접근관제소','삼목레이더','오성산관제수신소','신불관제송신소','동화작업장B 야생동물관리소','AICC','인재개발원','자유무역'],
  '청사': ['제2합동청사','제2합동청사 증축동'],
  '지하공동구': ['지하공동구'],
};

let selectedEmgCategory = null;
let selectedEmgGroup = null;

function openEmergency() {
  document.getElementById('emergencyOverlay').classList.add('open');
  document.getElementById('emergencyModal').classList.add('open');
  document.getElementById('emergencySearchInput').value = '';
  selectedEmgCategory = null;
  selectedEmgGroup = null;
  renderEmgCategories();
  renderEmergency();
}

function closeEmergency() {
  document.getElementById('emergencyOverlay').classList.remove('open');
  document.getElementById('emergencyModal').classList.remove('open');
}

function renderEmgCategories() {
  let html = '';
  // 1단계: 그룹 버튼
  html += `<div style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:0.4rem;">`;
  for (const group of Object.keys(emgGroups)) {
    const isActive = group === selectedEmgGroup || (group === '지하공동구' && selectedEmgCategory === '지하공동구');
    // 지하공동구는 하위 없이 바로 선택
    if (group === '지하공동구') {
      html += `<button class="emg-cat-btn ${isActive ? 'active' : ''}" onclick="selectEmgCategory('지하공동구');selectedEmgGroup='지하공동구';renderEmgCategories();">${group}</button>`;
    } else {
      html += `<button class="emg-cat-btn ${isActive ? 'active' : ''}" onclick="selectEmgGroup('${group}')">${group}</button>`;
    }
  }
  html += `</div>`;

  // 2단계: 선택된 그룹의 세부 카테고리
  if (selectedEmgGroup) {
    html += `<div id="emgSubScroll" style="display:flex;flex-wrap:wrap;gap:0.35rem;padding-top:0.3rem;border-top:1px solid var(--border);padding-bottom:0.2rem;">`;
    for (const cat of emgGroups[selectedEmgGroup]) {
      const isActive = cat === selectedEmgCategory;
      html += `<button class="emg-cat-btn ${isActive ? 'active' : ''}" style="font-size:0.72rem;" onclick="selectEmgCategory('${cat}')">${cat}</button>`;
    }
    html += `</div>`;
  }

  document.getElementById('emgCategories').innerHTML = html;

  // PC 마우스 드래그 스크롤
  const scroller = document.getElementById('emgSubScroll');
  if (scroller) {
    let isDown = false, startX, scrollLeft;
    scroller.addEventListener('mousedown', e => {
      isDown = true;
      scroller.style.cursor = 'grabbing';
      startX = e.pageX - scroller.offsetLeft;
      scrollLeft = scroller.scrollLeft;
    });
    scroller.addEventListener('mouseleave', () => { isDown = false; scroller.style.cursor = 'grab'; });
    scroller.addEventListener('mouseup', () => { isDown = false; scroller.style.cursor = 'grab'; });
    scroller.addEventListener('mousemove', e => {
      if (!isDown) return;
      e.preventDefault();
      const x = e.pageX - scroller.offsetLeft;
      scroller.scrollLeft = scrollLeft - (x - startX);
    });
  }
}

function selectEmgGroup(group) {
  selectedEmgGroup = group;
  selectedEmgCategory = null;
  document.getElementById('emergencySearchInput').value = '';
  renderEmgCategories();
  renderEmergency();
}

function selectEmgCategory(cat) {
  selectedEmgCategory = cat;
  document.getElementById('emergencySearchInput').value = '';
  renderEmgCategories();
  renderEmergency();
}

function searchEmergency() {
  const q = document.getElementById('emergencySearchInput').value.trim().toLowerCase();
  const suggestEl = document.getElementById('emergencySuggestions');

  if (!q) {
    suggestEl.style.display = 'none';
    suggestEl.innerHTML = '';
    selectedEmgCategory = null;
    selectedEmgGroup = null;
    renderEmgCategories();
    renderEmergency();
    return;
  }

  const regex = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  const results = []; // { buildingName, cat, group }

  for (const [cat, contacts] of Object.entries(emergencyData)) {
    const group = Object.entries(emgGroups).find(([g, cats]) => cats.includes(cat))?.[0] || '';

    for (const c of contacts) {
      if (c.phone !== '') continue; // subtitle만 대상
      if (c.name.startsWith('━')) continue; // 제목 제외

      // · / 로 분리해서 개별 건물명 검색
      const buildings = c.name.split(/[·\/]/).map(s => s.trim()).filter(Boolean);
      for (const b of buildings) {
        if (b.toLowerCase().includes(q)) {
          results.push({ buildingName: b, cat, group });
        }
      }
    }

    // 카테고리 이름 자체도 검색
    if (cat.toLowerCase().includes(q)) {
      if (!results.find(r => r.cat === cat && r.buildingName === cat)) {
        results.push({ buildingName: cat, cat, group });
      }
    }

    // 일반 장비명도 검색
    for (const c of contacts) {
      if (c.phone === '') continue;
      if (c.name.toLowerCase().includes(q) || c.phone.includes(q)) {
        if (!results.find(r => r.cat === cat)) {
          results.push({ buildingName: cat, cat, group });
        }
        break;
      }
    }
  }

  if (results.length === 0) {
    suggestEl.style.display = 'flex';
    suggestEl.innerHTML = `<div style="font-size:0.78rem;color:var(--text-muted);padding:0.3rem 0;">검색 결과 없음</div>`;
    document.getElementById('emergencyResults').innerHTML = `<div class="key-empty">검색 결과가 없습니다.</div>`;
    return;
  }

  suggestEl.style.display = 'flex';
  suggestEl.innerHTML = results.map(({ buildingName, cat, group }) => {
    const highlighted = buildingName.replace(regex, '<mark style="background:rgba(245,158,11,0.35);color:var(--highlight);border-radius:2px;padding:0 1px;">$1</mark>');
    return `<div onclick="selectFromSuggestion('${cat}')" style="cursor:pointer;padding:0.35rem 0.6rem;border-radius:8px;font-size:0.82rem;color:var(--text);background:var(--surface2);border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:0.5rem;transition:border-color 0.15s;" onmouseover="this.style.borderColor='var(--red)'" onmouseout="this.style.borderColor='var(--border)'">
      <span>${highlighted}</span>
      <span style="font-size:0.7rem;color:var(--text-muted);white-space:nowrap;">${cat}</span>
    </div>`;
  }).join('');

  document.getElementById('emergencyResults').innerHTML = `<div class="key-empty">목록에서 선택해주세요.</div>`;
}

function selectFromSuggestion(cat) {
  document.getElementById('emergencySearchInput').value = '';
  document.getElementById('emergencySuggestions').style.display = 'none';
  document.getElementById('emergencySuggestions').innerHTML = '';
  // 그룹도 자동 선택
  const group = Object.entries(emgGroups).find(([g, cats]) => cats.includes(cat))?.[0] || null;
  selectedEmgGroup = group;
  selectedEmgCategory = cat;
  renderEmgCategories();
  renderEmergency();
}

function renderEmergency() {
  const q = document.getElementById('emergencySearchInput').value.trim().toLowerCase();

  // 검색어 하이라이트 함수
  function highlight(text, query) {
    if (!query) return text;
    const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    return text.replace(regex, '<mark style="background:rgba(245,158,11,0.35);color:var(--highlight);border-radius:2px;padding:0 1px;">$1</mark>');
  }
  let items = [];

  if (q) {
    for (const [cat, contacts] of Object.entries(emergencyData)) {
      // 카테고리 제목 문구(phone==='')에 검색어가 포함되면 카테고리 전체 표시
      const labelMatch = contacts.some(c => c.phone === '' && c.name.toLowerCase().includes(q));
      if (labelMatch) {
        items.push(...contacts.map(c => ({ ...c, category: cat })));
        continue;
      }
      // 일반 장비명/전화번호 검색
      for (const c of contacts) {
        if (c.phone !== '' && (c.name.toLowerCase().includes(q) || c.phone.includes(q))) {
          items.push({ ...c, category: cat });
        }
      }
    }
  } else if (selectedEmgCategory) {
    items = (emergencyData[selectedEmgCategory] || []).map(c => ({ ...c, category: selectedEmgCategory }));
  }

  const el = document.getElementById('emergencyResults');

  if (!q && !selectedEmgCategory) {
    el.innerHTML = `<div class="key-empty">${selectedEmgGroup ? '세부 구역을 선택해주세요.' : '구역을 선택해주세요.'}</div>`;
    return;
  }
  if (items.length === 0) {
    el.innerHTML = `<div class="key-empty">검색 결과가 없습니다.</div>`;
    return;
  }

  el.innerHTML = items.map(c => {
    if (c.phone === '') {
      if (c.name.startsWith('━')) {
        return `<div style="text-align:center;color:var(--accent2);font-size:0.8rem;font-weight:700;padding:0.4rem;letter-spacing:0.05em;font-family:'JetBrains Mono',monospace;">${c.name}</div>`;
      }
      return `<div style="text-align:center;color:var(--text-muted);font-size:0.7rem;padding:0.2rem 0.8rem 0.5rem;line-height:1.6;">${c.name}</div>`;
    }
    const catSpan = (c.category && q) ? `<span class="emg-sub">${highlight(c.category, q)}</span>` : '';
    const hasRemark = !!c.remark;
    const isSago = hasRemark && c.remark.includes('사고전화');
    const remarkNum = hasRemark ? c.remark.replace(/.*?(\d[\d-]+)$/, '$1').replace(/-/g,'') : '';
    const remarkLabel = hasRemark ? c.remark.replace(/.*?: /, '') : '';
    const remarkIcon = isSago ? '사고전화' : '야간휴일';
    const remarkClass = isSago ? 'emg-sago-link' : 'emg-night-link';
    const remarkBtn = hasRemark ? `<a class="${remarkClass}" href="tel:${remarkNum}">${remarkIcon} ${remarkLabel}</a>` : '';
    return `<div class="emg-item"><div class="emg-name">${highlight(c.name, q)}${catSpan}</div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.2rem;"><a class="emg-phone-link" href="tel:${c.phone.replace(/-/g,'')}">${highlight(c.phone, q)}</a>${remarkBtn}</div></div>`;
  }).join('');
}
